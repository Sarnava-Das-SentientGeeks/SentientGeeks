<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <style>
        .container{
            display:grid;
            grid-template-columns: minmax(80px,1fr) repeat(3,1fr);
            grid-template-rows:auto auto ; 
            background-color: dodgerblue;
            padding: 10px;
            width:500px;
            /* column-gap:50px;
            row-gap:50px; */
            gap:20px;
            place-content: space-around end ;
        }
        .container div{
            background-color: #f1f1f1;
            border: 1px solid black;
            padding:10px;
            font-size:30px;
            text-align:center;

        }
        .item1{
            grid-column: 1 / span 2;
        }
    </style>
    <body>
        <div class="container">
            <div class="item1">1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
             <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
        </div>
    </body>
</html>
