<html>
    <head>
        <title>Inheritance in CSS</title>
        <style>
            p{
                color:blue;
                font-size:20px;
                border: 1px solid red;
            }
            strong{
                border:inherit;
            }
        </style>
    </head>
    <body>
        <p>This is a paragraph with some <strong>important</strong> text.</p>
    </body>
</html>
