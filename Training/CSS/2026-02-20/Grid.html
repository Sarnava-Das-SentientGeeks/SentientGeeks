<!DOCTYPE html>
<html lang="en">
    <head>
        
        <title>Grid in HTML</title>
        <style>
            .container{
                display:grid;
              
                grid-template-columns: auto auto auto auto;
                grid-template-rows: auto auto;
                background-color: rgb(21, 122, 223);
                padding:10px;
            }
            .container div{
                background-color: #f1f1f1;
                border: 1px solid rgba(0, 0, 0, 0.8);
                padding:20px;
                font-size:30px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div>Box 1</div>
            <div>Box 2</div>
            <div>Box 3</div> 
             <div>Box 4</div>
            <div>Box 5</div>
            <div>Box 6</div>    
             <div>Box 7</div>
            <div>Box 8</div>
            <div>Box 9</div>    
             <div>Box 10</div>
            <div>Box 11</div>
            <div>Box 12</div>  
            <div>Box 13</div>
             <div>Box 14</div>     
             <div>Box 15</div>
             <div>Box 16</div>     
        </div>
    </body>
</html>
