<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>
            header{
                background-color:#f1f1f1 ;
                text-align: center;
                padding:10px;
            }

            ul.topnav{
                display:flex;
                list-style-type: none;
                margin:0;
                padding:0;
                background-color: #333333;
                justify-content: center;
                align-items: center;
        
            }

            ul.topnav li a{
                display:inline-block;
                color: #f1f1f1;
                padding: 14px 16px;
                text-decoration: none;
            }
            ul.topnav li a:hover{
                background-color: #dddddd;
                color: black;
            }
        </style>
    </head>
    <body>
        <header>
        <h1>My Header</h1>
        </header>

        <ul class="topnav">
        <li><a href="#">Home</a></li>
        <li><a href="#">News</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">About</a></li>
        </ul>
    </body>
</html>
