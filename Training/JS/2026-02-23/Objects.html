<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
    </head>
    <body>
        <h1>Creating JavaScript Objects</h1>
        <h2>Using an Object Literal</h2>

        
        <p id="demo"></p>
        <button type="button" onclick="myFunction()">Click me!</button>
        <hr>

        <p id="newPerson"></p>
        <button type="button" onclick="newPersonFunction()">New person </button>
        <hr>

        <!--Displaying the new property that was added later-->
        <p id="newProperty"></p>
        <button type="button" onclick="newPersonFunction()">New property of person  </button>
        <hr>
       <script>
            function myFunction(){
            //Creating an object
            const person={
                firstName:'John',
                lastName:'Doe',
                age:50,
                eyeColor:'blue',
            };
            //Display data from the object
            document.getElementById('demo').innerHTML=person.firstName+'is'+person.age+'years old';
        }
        function newPersonFunction()
        {
            const new_person = new Object({
                firstName:"Hello",
                lastName:"World",
                age:50,
                eyeColor:"red",
                fullName: function(){
                    return this.firstName+" "+this.lastName;
                }
            });
            //adding new property after object creation
            new_person.gender="Male"
            //deleting object properties
            delete new_person.age;

            document.getElementById('newPerson').innerHTML=new_person.fullName();
            
            document.getElementById('newProperty').innerHTML=new_person.gender;
        }
        </script>
    </body>
</html>
