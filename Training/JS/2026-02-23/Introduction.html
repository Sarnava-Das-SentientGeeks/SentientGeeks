<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Introduction in JavaScript</title>
    </head>
    <body>
        <h2 id="demo" style="font-size:50px;">What Can JavaScript Do?</h2>

        <p id="invisible">JavaScript can change HTML attribute values.</p>

        <p>In this case JavaScript changes the value of the src (source) attribute of an image.</p>
    
        <button onclick="document.getElementById('myImage').src='on.gif'">Turn on the light</button>
        <img id="myImage" src="bulb.gif" style="width:100px;">
        <button onclick="document.getElementById('myImage').src='off.gif'">Turn off the light</button>
        
        <button type="button" onclick="document.getElementById('demo').style.fontSize='35px'">Click Me!</button>
        <button type="button" onclick="document.getElementById('invisible').style.display='none'">Click to vanish the paragraph</button>
    </body>
</html>
