<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
       const myPromise = new Promise((resolve,reject)=>{
        let success = true;
        if(success){
            resolve("Operation Successful");
        }
        else{
            reject("Operation Failed");
        }
       });

       myPromise.then(result=>{
        console.log(result);
       })
       .catch(error=>{
        console.log(error);
       })
    </script>
</body>
</html>
