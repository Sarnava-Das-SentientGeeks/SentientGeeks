<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>This example shows the syntax of an Arrow Function, and how to use it.</p>

    <p id="demo"></p>

    <script>
        //after arrow functions
        const add=(a,b)=>a*b;

        //Before arrow functions
        const multiply=function(a,b){return a*b};
        let result=add(4,5);
        let product =multiply(6,4);
        document.getElementById("demo").innerHTML="The product is"+result;
         document.getElementById("demo").innerHTML="The product is"+product;

    </script>
</body>
</html>
