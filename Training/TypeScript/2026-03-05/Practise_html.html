<!Doctype html>
<html>
    <head>
        <title>Practise</title>
        <style>
            *{
                font-family: Arial, Helvetica, sans-serif;

            }
               .container{
                display:grid;
                grid-template-columns: repeat(3fr,3);
                gap:1fr;
               } 
            .nav{
                display:flex;
                justify-content: end;
                align-items: center;
                flex-flow: row wrap;
                background-color: blue;

               }
            
               li{
                display: inline-block;
                padding:20px;
               }
               li a{
                text-decoration: none;
                background-color: aliceblue;

               }
               li a:hover{
                background-color: dodgerblue;
               }
               li a:active{
                background-color: blueviolet;
               }

        </style>
    </head>
    <body>

        <nav class="nav">
            <ul>
                <li>Home</li>
                <li>Privacy</li>
                <li>Contact</li>
            </ul>
        </nav>
    </body>
</html>
