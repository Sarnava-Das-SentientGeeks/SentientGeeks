<!DOCTYPE html>
<html>
    <head>
        <title>Form in HTML</title>
        <!--internal CSS-->
        <style>
            body{background-color: powderblue;}
            h1{color:blue; font-family:verdana;font-size:300%;text-align:center;}
            p{color:red; font-family:courier;font-size:160%;border:2px solid powderblue;padding:30px;margin:50px;}
            div{text-align:center;}
        </style>

        <!--External CSS which overrides the internal CSS-->
        <link rel="stylesheet" href="/html/styles.css">
    </head>
    <body>
        <h1>This is a form</h1>
        <div>
          <p>Choose your favorite web language:</p>

          <form>
            <input type="radio" id="html" name="fav_language" value="HTML">
            <label for="html">HTML</label><br>
            <input type="radio" id="css" name="fav_language" value="CSS">
            <label for="css">CSS</label><br>
            <input type="radio" id="javascript" name="fav_language" value="JavaScript">
            <label for="javascript">JavaScript</label>
          </form>
          <hr>
          
          <p>Choose your vehicle</p>
          <form>
            <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike">
            <label for="vehicle1"> I have a bike</label><br>
            <input type="checkbox" id="vehicle2" name="vehicle2" value="Car">
            <label for="vehicle2"> I have a car</label><br>
            <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat">
            <label for="vehicle3"> I have a boat</label>
          </form>
          <hr>

          <p>Submit your details</p>
          <form action="/action_page.php">
            <label for="fname">First Name:</label><br>
            <input type="text" id="fname" name="fname" value="John"><br>
            <label for="lname">Last Name:</label>
            <input type="text" id="lname" name="lname" value="Doe"><br>
            <input type="submit" value="Click Me!">
          </form>
          <hr>

          <p>Drop-down list</p>
          <label for="cars">Choose a car:</label>
          <select id="cars" name="cars" size="3" multiple>
                <option value="volvo">Volvo</option>
                <option value="saab">Saab</option>
                <option value="fiat" selected>Fiat</option>
                <option value="audi">Audi</option>
          </select>

          <p>Multi-line input</p>
          <!--<textarea name="message" style="width:200px; height:600px"-->
            <textarea name="message" rows="10" cols="30">
                The cat was playing in the garden.
            </textarea>
            <hr>

            <button type="button" onclick="alert('Hello World!')">Click Me!</button>

            <form action="/action_page.php">
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="name"><br>       
                    <label for="email">Email:</label><br>
                    <input type="email" id="email" name="email"><br><br>    
                    <input type="submit" value="Submit">
                </fieldset>
            </form>


        </div>
    </body>
</html>
