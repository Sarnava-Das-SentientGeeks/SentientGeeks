<!DOCTYPE html>
<html lang="en">
    <head>
        
        <title>File Paths in HTML</title>
    </head>
    <body>
        <!--File path in the same folder-->
        <img src="picture.jpg">
        
        <!--file located in images folder in the current folder-->
        <img src="images/picture.jpg">

        <!--file located in the images of folder at the root of the current web-->
        <img src="/images/picture.jpg">

        <!--file located in some folder one level -->
        <img src="../picture.jpg">
    </body>
</html>
