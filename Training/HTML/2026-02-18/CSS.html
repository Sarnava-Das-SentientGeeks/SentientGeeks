<!DOCTYPE html>
<html>
    <head>
        <title>CSS in HTML</title>
        <!--internal CSS-->
        <style>
            body{background-color: powderblue;}
            h1{color:blue; font-family:verdana;font-size:300%;}
            p{color:red; font-family:courier;font-size:160%;border:2px solid powderblue;padding:30px;margin:50px;}
        </style>

        <!--External CSS-->
        <link rel="stylesheet" href="/html/styles.css">
    </head>
    <body>
        <!--inline CSS-->
        <h1 style="color:blue;">A Blue Heading</h1>
        <p style="color:red;">This is a red paragraph.</p>
    
        <h1>This is a heading with internal CSS</h1>
        <p>This is a paragraph with internal CSS.</p>
    </body>
</html>
