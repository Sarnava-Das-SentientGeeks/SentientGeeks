<!Doctype html>
<html lang="en-US">
    <head>
        <title>Attributes in HTML</title>
    </head>
    <body>
        <a href="https://www.w3schools.com">Visit W3Schools.com!</a>
        <img src="img.jpg" alt="This is displayed when the image is not loaded" width="500" height="600">
        <p style="color:blue;">This is a blue paragraph.</p>
        <hr>
        <p title="I'm a tooltip!">Hover over this paragraph to see the tooltip.</p>
    </body>
</html>
