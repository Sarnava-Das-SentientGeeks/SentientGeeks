<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <style>

            *{
                box-sizing:border-box;
                
            }
            body{
                background: url(https://picsum.photos/200/300/?blur);
                background-repeat: repeat-x;
                background-repeat: repeat-y;
                font-family:serif ;
             
            }
            .container{
                grid-template-columns: 'header';
            }
            .nav{
                background:transparent;
               
                display: flex;
                flex-flow: end nowrap;
                justify-content: end;

                
              

            }
            ul{
                
                list-style-type: none;
                margin:0;
                padding:0;
                display:flex;
                
                flex-flow: inherit;
                justify-content: inherit;
                
            }
            li{
                display:block;
                padding:10px;

            }
            li a{
                text-decoration: none;
                color:white;
            }
            li a:hover{
                color:dark blue;
            }
            #Login{
                background-color: orange;
                color:white;
                font-family: Arial, Helvetica, sans-serif;
                border-radius: 5px;
            }
            #Signup{
                background:transparent;
                text-align:center;
                color:white;
               border: 2px white solid;
                border-radius:5px;
            }

        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1></h1>
            </div>

            <div class="nav">
             
                <ul>
                    <li><a link="#">Home</a></li>
                    <li><a link="#">Pages</a></li>
                    <li><a link="#">Contact</a></li>

                </ul>
                <button type="button" id="Login" style="border:none;">LOG IN</button>
                <button type="button" id="Signup" style="border:none;">SIGN UP</button>
            </div>
            
        </div>
    </body>
</html>
